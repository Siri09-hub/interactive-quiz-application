<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">

    <h1 class="test-title">HTML, CSS & JS Quiz</h1>

    <div class="top-bar">
        <span id="timer">Time: 10</span>
    </div>

    <!-- Question Box -->
    <div class="question-box">
        <h2 id="question"></h2>
    </div>

    <div id="options">
        <button class="option" onclick="selectAnswer(0)"></button>
        <button class="option" onclick="selectAnswer(1)"></button>
        <button class="option" onclick="selectAnswer(2)"></button>
        <button class="option" onclick="selectAnswer(3)"></button>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">Next</button>

</div>

<script src="script.js"></script>
</body>
</html>
